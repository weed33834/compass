<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="Compass Logo">
  <!-- Compass 项目专属 LOGO：黄铜罗盘 + 北指针 + 八方位刻度
       配色取自项目主题：abyss 背景 / ivory 表盘 / brass 环 / coral 北指针 -->
  <defs>
    <radialGradient id="bg" cx="0.5" cy="0.4" r="0.8">
      <stop offset="0" stop-color="#0f1820"/>
      <stop offset="1" stop-color="#0a0f14"/>
    </radialGradient>
    <linearGradient id="brassRing" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d9b14f"/>
      <stop offset="0.5" stop-color="#c89b3c"/>
      <stop offset="1" stop-color="#8c6a22"/>
    </linearGradient>
    <linearGradient id="brassRingInner" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#d9b14f"/>
      <stop offset="0.5" stop-color="#c89b3c"/>
      <stop offset="1" stop-color="#8c6a22"/>
    </linearGradient>
    <radialGradient id="dial" cx="0.5" cy="0.42" r="0.65">
      <stop offset="0" stop-color="#f5f1e8"/>
      <stop offset="0.7" stop-color="#ece5d2"/>
      <stop offset="1" stop-color="#d4cab2"/>
    </radialGradient>
    <linearGradient id="northPole" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f06356"/>
      <stop offset="1" stop-color="#b8413a"/>
    </linearGradient>
    <linearGradient id="southPole" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a4655"/>
      <stop offset="1" stop-color="#1a2230"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3" result="offsetBlur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 深渊背景 -->
  <rect width="256" height="256" rx="40" fill="url(#bg)"/>

  <!-- 外圈：黄铜环 -->
  <g filter="url(#softShadow)">
    <circle cx="128" cy="128" r="108" fill="none" stroke="url(#brassRing)" stroke-width="14"/>
    <circle cx="128" cy="128" r="100" fill="none" stroke="#0a0f14" stroke-width="1"/>
    <circle cx="128" cy="128" r="96" fill="none" stroke="url(#brassRingInner)" stroke-width="2"/>
  </g>

  <!-- 表盘 -->
  <circle cx="128" cy="128" r="88" fill="url(#dial)"/>

  <!-- 主四向刻度（N/E/S/W，加粗） -->
  <g stroke="#1a2230" stroke-width="3" stroke-linecap="round">
    <line x1="128" y1="46" x2="128" y2="62"/>
    <line x1="128" y1="194" x2="128" y2="210"/>
    <line x1="46" y1="128" x2="62" y2="128"/>
    <line x1="194" y1="128" x2="210" y2="128"/>
  </g>
  <!-- 副四向（NE/SE/SW/NW，细线） -->
  <g stroke="#5a6878" stroke-width="1.5" stroke-linecap="round">
    <line x1="71.7" y1="71.7" x2="83.1" y2="83.1"/>
    <line x1="172.9" y1="172.9" x2="184.3" y2="184.3"/>
    <line x1="184.3" y1="71.7" x2="172.9" y2="83.1"/>
    <line x1="83.1" y1="172.9" x2="71.7" y2="184.3"/>
  </g>
  <!-- 32 个细刻度（每 11.25°） -->
  <g stroke="#8a96a6" stroke-width="0.8" stroke-linecap="round" opacity="0.7">
    <line x1="128" y1="48" x2="128" y2="54" transform="rotate(11.25 128 128)"/>
    <line x1="128" y1="48" x2="128" y2="54" transform="rotate(22.5 128 128)"/>
    <line x1="128" y1="48" x2="128" y2="54" transform="rotate(33.75 128 128)"/>
    <line x1="128" y1="48" x2="128" y2="54" transform="rotate(56.25 128 128)"/>
    <line x1="128" y1="48" x2="128" y2="54" transform="rotate(67.5 128 128)"/>
    <line x1="128" y1="48" x2="128" y2="54" transform="rotate(78.75 128 128)"/>
    <line x1="128" y1="48" x2="128" y2="54" transform="rotate(101.25 128 128)"/>
    <line x1="128" y1="48" x2="128" y2="54" transform="rotate(112.5 128 128)"/>
    <line x1="128" y1="48" x2="128" y2="54" transform="rotate(123.75 128 128)"/>
    <line x1="128" y1="48" x2="128" y2="54" transform="rotate(146.25 128 128)"/>
    <line x1="128" y1="48" x2="128" y2="54" transform="rotate(157.5 128 128)"/>
    <line x1="128" y1="48" x2="128" y2="54" transform="rotate(168.75 128 128)"/>
    <line x1="128" y1="48" x2="128" y2="54" transform="rotate(191.25 128 128)"/>
    <line x1="128" y1="48" x2="128" y2="54" transform="rotate(202.5 128 128)"/>
    <line x1="128" y1="48" x2="128" y2="54" transform="rotate(213.75 128 128)"/>
    <line x1="128" y1="48" x2="128" y2="54" transform="rotate(236.25 128 128)"/>
    <line x1="128" y1="48" x2="128" y2="54" transform="rotate(247.5 128 128)"/>
    <line x1="128" y1="48" x2="128" y2="54" transform="rotate(258.75 128 128)"/>
    <line x1="128" y1="48" x2="128" y2="54" transform="rotate(281.25 128 128)"/>
    <line x1="128" y1="48" x2="128" y2="54" transform="rotate(292.5 128 128)"/>
    <line x1="128" y1="48" x2="128" y2="54" transform="rotate(303.75 128 128)"/>
    <line x1="128" y1="48" x2="128" y2="54" transform="rotate(326.25 128 128)"/>
    <line x1="128" y1="48" x2="128" y2="54" transform="rotate(337.5 128 128)"/>
    <line x1="128" y1="48" x2="128" y2="54" transform="rotate(348.75 128 128)"/>
  </g>

  <!-- 方位字母 N E S W -->
  <g font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="14" fill="#1a2230" text-anchor="middle" dominant-baseline="middle">
    <text x="128" y="38">N</text>
    <text x="128" y="220">S</text>
    <text x="38" y="128">W</text>
    <text x="220" y="128">E</text>
  </g>

  <!-- 罗盘玫瑰：南北指针 -->
  <g filter="url(#softShadow)">
    <!-- 南指针（深色） -->
    <polygon points="128,128 116,196 128,206 140,196" fill="url(#southPole)" stroke="#0a0f14" stroke-width="0.5"/>
    <!-- 北指针（珊瑚红） -->
    <polygon points="128,128 116,60 128,50 140,60" fill="url(#northPole)" stroke="#0a0f14" stroke-width="0.5"/>
    <!-- 东西指针（黄铜暗调） -->
    <polygon points="128,128 60,116 50,128 60,140" fill="#a3851c" stroke="#0a0f14" stroke-width="0.5"/>
    <polygon points="128,128 196,116 206,128 196,140" fill="#a3851c" stroke="#0a0f14" stroke-width="0.5"/>
  </g>

  <!-- 中心轴 -->
  <circle cx="128" cy="128" r="8" fill="#1a2230" stroke="#c89b3c" stroke-width="2"/>
  <circle cx="128" cy="128" r="2.5" fill="#c89b3c"/>
</svg>
