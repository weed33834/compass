# Compass CI — 最低程度的自动化
# 仅做：typecheck + lint + 单元测试 + build 四项校验，确保 main 分支始终可编译且核心逻辑正确
# 不做：自动发布、自动部署、依赖更新（依赖由 maintainer 手动管理）
# 不做：自动合并 PR（合并由 maintainer 手动决定）
# 不做：机器人自动评论 / 自动打标签 / 自动分配 reviewer

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 同一分支的新提交取消旧 run，省 CI 配额
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: typecheck · lint · unit-tests · build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm db:generate

      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit tests（判分 + FSRS + 解析器）
        run: pnpm test:unit

      - name: Build
        run: pnpm build
        env:
          # Build 时不需要真实 DB 连接，但 Next.js 静态分析会读取这些变量
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?schema=public
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: ci-placeholder-secret-not-used-in-production

  docker-build:
    name: docker-build（验证 Dockerfile 可构建）
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # 仅在 main 分支 push 时跑（PR 跳过省配额）
    if: github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: compass:ci
          build-args: |
            DATABASE_URL=postgresql://ci:ci@localhost:5432/ci?schema=public
            NEXTAUTH_URL=http://localhost:3000
            NEXTAUTH_SECRET=ci-placeholder-secret
