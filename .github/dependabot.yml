# Dependabot 配置 — 启用版本更新（含 auto-merge）
#
# 维护策略：
#   - npm / docker / github-actions 三类依赖每周扫描
#   - 启用 auto-merge，减少 maintainer 手动操作
#   - 每个生态最多 5 个开放 PR，避免噪音

version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    auto-merge:
      enabled: true
    open-pull-requests-limit: 5
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    auto-merge:
      enabled: true
    open-pull-requests-limit: 5
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    auto-merge:
      enabled: true
    open-pull-requests-limit: 5
