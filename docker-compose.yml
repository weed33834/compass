# Compass · 一键 Docker Compose 部署
# 用法：
#   1. 复制 .env.example → .env，修改敏感字段
#   2. docker compose up -d
#   3. 访问 http://localhost:3000
#
# 包含：app（Compass 本体） + db（PostgreSQL 17）+ 可选 caddy（自动 HTTPS 反代）

services:
  db:
    image: postgres:17-alpine
    container_name: compass-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-compass}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-compass}
    volumes:
      - compass-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-compass} -d ${POSTGRES_DB:-compass}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # 不暴露端口到宿主机（仅内部网络可见），如需外部调试取消下行注释
    # ports:
    #   - "5432:5432"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: compass-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # 数据库连接（服务名 db 即主机名）
      DATABASE_URL: postgresql://${POSTGRES_USER:-compass}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-compass}?schema=public
      # NextAuth
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?必须设置 NEXTAUTH_SECRET，可用 openssl rand -base64 32 生成}
      # 邮件（可选）
      SMTP_URL: ${SMTP_URL:-}
      # OAuth（可选）
      GITHUB_ID: ${GITHUB_ID:-}
      GITHUB_SECRET: ${GITHUB_SECRET:-}
      GOOGLE_ID: ${GOOGLE_ID:-}
      GOOGLE_SECRET: ${GOOGLE_SECRET:-}
      NEXT_PUBLIC_OAUTH_PROVIDERS: ${NEXT_PUBLIC_OAUTH_PROVIDERS:-}
      # 可信代理（部署在 Caddy/Nginx 后时填写代理 IP，逗号分隔）
      TRUSTED_PROXY_IPS: ${TRUSTED_PROXY_IPS:-}
    ports:
      - "${APP_PORT:-3000}:3000"

  # 可选：Caddy 自动 HTTPS 反代（生产环境推荐）
  # 取消注释并配置 DOMAIN 即可启用
  # caddy:
  #   image: caddy:2-alpine
  #   container_name: compass-caddy
  #   restart: unless-stopped
  #   depends_on:
  #     - app
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   environment:
  #     DOMAIN: ${DOMAIN:-compass.local}
  #   volumes:
  #     - ./Caddyfile:/etc/caddy/Caddyfile:ro
  #     - caddy-data:/data
  #     - caddy-config:/config

volumes:
  compass-pgdata:
  # caddy-data:
  # caddy-config:
